services:
  mysql:
    image: mysql:8.0
    container_name: testrium-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testrium}
      MYSQL_USER: ${MYSQL_USER:-testrium}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-testrium123}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - testrium-network

  backend:
    image: panjatancoders/testrium-backend:latest
    container_name: testrium-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-testrium}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USERNAME: ${MYSQL_USER:-testrium}
      DB_PASSWORD: ${MYSQL_PASSWORD:-testrium123}
      DB_DIALECT: org.hibernate.dialect.MySQLDialect
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_TO_A_RANDOM_SECRET_STRING_MIN_32_CHARS}
      JIRA_ENCRYPTION_KEY: ${JIRA_ENCRYPTION_KEY:-TestriumJiraKey1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      CLIENT_NAME: ${CLIENT_NAME:-Testrium}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@testrium.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      EMAIL_VERIFICATION_REQUIRED: ${EMAIL_VERIFICATION_REQUIRED:-false}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-smtp.gmail.com}
      MAIL_SMTP_USERNAME: ${MAIL_SMTP_USERNAME:-}
      MAIL_SMTP_PASSWORD: ${MAIL_SMTP_PASSWORD:-}
    networks:
      - testrium-network

  frontend:
    image: panjatancoders/testrium-frontend:latest
    container_name: testrium-frontend
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - testrium-network

volumes:
  mysql_data:

networks:
  testrium-network:
    driver: bridge
