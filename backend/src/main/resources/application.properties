server.port=8080

# Import client configuration
spring.config.import=optional:classpath:client-config.properties

# H2 Database (File-based for persistence)
spring.datasource.url=jdbc:h2:file:./data/testrium
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# Email Configuration
spring.mail.host=${mail.smtp.host:smtp.gmail.com}
spring.mail.port=${mail.smtp.port:587}
spring.mail.username=${mail.smtp.username:}
spring.mail.password=${mail.smtp.password:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${mail.smtp.starttls.enable:true}
