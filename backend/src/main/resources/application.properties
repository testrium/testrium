server.port=${SERVER_PORT:8080}

# Import client configuration
spring.config.import=optional:classpath:client-config.properties

# Database - defaults to H2 (dev), override with MySQL env vars for production
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/testrium}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update

# H2 Console - disabled by default, enable only for local dev
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# JWT
jwt.secret=${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_USE_A_LONG_RANDOM_STRING_32CHARS}
jwt.expiration=${JWT_EXPIRATION:86400000}

# JIRA token encryption key (must be exactly 16 characters)
jira.encryption.key=${JIRA_ENCRYPTION_KEY:TestriumJiraKey1}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}

# Email Configuration
spring.mail.host=${mail.smtp.host:smtp.gmail.com}
spring.mail.port=${mail.smtp.port:587}
spring.mail.username=${mail.smtp.username:}
spring.mail.password=${mail.smtp.password:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${mail.smtp.starttls.enable:true}
