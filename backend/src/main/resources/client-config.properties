# Client Configuration
# Configure this file for each client deployment

# Client Information
client.name=Pramana
client.domain=pramana.com
client.allowed.email.domains=pramana.com

# Registration Settings
registration.enabled=true
registration.email.verification.required=false
registration.email.verification.timeout.minutes=5

# Admin Settings - CHANGE THESE FOR EACH CLIENT
admin.default.email=admin@pramana.com
admin.default.password=admin123

# SMTP Configuration (Optional - only needed if email verification enabled)
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.username=
mail.smtp.password=
mail.smtp.from=noreply@pramana.com
mail.smtp.starttls.enable=true
