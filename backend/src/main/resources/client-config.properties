# Client Configuration
client.name=${CLIENT_NAME:Testrium}
client.domain=${CLIENT_DOMAIN:}
client.allowed.email.domains=${CLIENT_ALLOWED_DOMAINS:}

# Registration Settings
registration.enabled=${REGISTRATION_ENABLED:true}
registration.email.verification.required=${EMAIL_VERIFICATION_REQUIRED:false}
registration.email.verification.timeout.minutes=5

# Admin Settings - override via environment variables
admin.default.email=${ADMIN_EMAIL:admin@testrium.com}
admin.default.password=${ADMIN_PASSWORD:Admin@123}

# SMTP Configuration (optional - only needed if email verification is enabled)
mail.smtp.host=${MAIL_SMTP_HOST:smtp.gmail.com}
mail.smtp.port=${MAIL_SMTP_PORT:587}
mail.smtp.username=${MAIL_SMTP_USERNAME:}
mail.smtp.password=${MAIL_SMTP_PASSWORD:}
mail.smtp.from=${MAIL_SMTP_FROM:noreply@testrium.com}
mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
