version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pramana-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: test123
      MYSQL_DATABASE: pramana_test
    ports:
      - "3307:3306"
    volumes:
      - mysql-test-data:/var/lib/mysql

  backend:
    build: ../backend
    container_name: pramana-backend-test
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pramana_test
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: test123
    depends_on:
      - mysql

volumes:
  mysql-test-data:
