name: Build & Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Job 1: Build JAR and attach to GitHub Release ────────────
  build-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Inject frontend into backend and build JAR
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r dist/* backend/src/main/resources/static/
          cd backend
          mvn clean package -DskipTests -B
          cd ..
          JAR_FILE=$(find backend/target -name "*.jar" ! -name "*sources*" | head -1)
          cp "$JAR_FILE" "testrium-${{ steps.version.outputs.version }}.jar"

      - name: Create or update GitHub Release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: testrium-${{ steps.version.outputs.version }}.jar
          fail_on_unmatched_files: true

  # ── Job 2: Build and push Docker image ───────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sddmhossain/testrium:${{ steps.version.outputs.version }}
            sddmhossain/testrium:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
